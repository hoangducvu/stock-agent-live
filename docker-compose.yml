version: "3.8"

services:
  # ── Trading Bot (runs 24/7) ──────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: stockbot
    restart: always
    env_file: .env
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
    networks:
      - stocknet

  # ── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: stockbot-api
    restart: always
    env_file: .env
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
    networks:
      - stocknet

  # ── React Frontend (nginx) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: stockbot-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stocknet

volumes:
  bot-data:
  bot-logs:

networks:
  stocknet:
    driver: bridge
